version: '3.8'
services:
  app:
    build: .
    container_name: devops_calculadora_app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: devops_calculadora_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: devops_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: